# configs/rag/v9/graph_rag_v3_cot_gpt4o_gen.yaml
# Same retrieval as v3 CoT (best config), but using GPT-4o for generation
# Eval always uses GPT-4o via --eval-provider/--eval-model CLI args

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         7
  max_neighbors: 30
  rerank_model:  BAAI/bge-reranker-base

generation:
  provider: openai
  model: gpt-4o
  temperature: 0.7
