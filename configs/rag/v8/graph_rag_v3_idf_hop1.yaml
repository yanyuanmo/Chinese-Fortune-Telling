# configs/rag/v8/graph_rag_v3_idf_hop1.yaml
# Graph RAG v3 (hop=1): IDF-weighted edges + degree pruning + weighted BFS
# Same as v3_idf but hop=1, for A/B comparison with hop=2

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         7
  max_neighbors: 30
  rerank_model:  BAAI/bge-reranker-base

generation:
  provider: kimi
  model: moonshot-v1-32k
  temperature: 0.7
