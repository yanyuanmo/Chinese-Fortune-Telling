# Graph RAG v3 CoT with bge-reranker-large (560M params)
# Experiment: Does a larger reranker improve Graph RAG performance?
# Baseline: graph_rag_v3_cot_only.yaml (bge-reranker-base, 278M)

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         7
  max_neighbors: 30
  rerank_model:  BAAI/bge-reranker-large

generation:
  provider: kimi
  model: moonshot-v1-32k
  temperature: 0.7
