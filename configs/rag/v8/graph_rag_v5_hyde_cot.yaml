# configs/rag/v8/graph_rag_v5_hyde_cot.yaml
# Graph RAG v5: HyDE seed + IDF graph + BGE reranker + CoT prompt
# HyDE generates classical Chinese pseudo-document for better seed embedding match,
# then graph BFS expands cross-book neighbors, BGE reranker uses original query to rank.

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         7
  max_neighbors: 30
  rerank_model:  BAAI/bge-reranker-base
  hyde:          true

generation:
  provider: kimi
  model: moonshot-v1-32k
  temperature: 0.7
