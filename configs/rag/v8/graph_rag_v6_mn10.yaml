# configs/rag/v8/graph_rag_v6_mn10.yaml
# Graph RAG v6: v3 CoT + max_neighbors=10 (reduced from 30)
# Ablation: can reranker perform better with fewer neighbor noise?

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         7
  max_neighbors: 10
  rerank_model:  BAAI/bge-reranker-base

generation:
  provider: kimi
  model: moonshot-v1-32k
  temperature: 0.7
