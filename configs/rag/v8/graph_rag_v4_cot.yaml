# configs/rag/v8/graph_rag_v4_cot.yaml
# Graph RAG v4: IDF-weighted edges + bge-reranker-v2-m3 + CoT prompt
# Changes vs v3_idf_hop1:
#   - reranker: bge-reranker-base → bge-reranker-v2-m3 (568M, better cross-lingual)
#   - top_n: 7 → 10 (more context for multi-book reasoning)
#   - CoT prompt in bench_multihop.py (code change, not config)
#   - 429 retry with exponential backoff (code change)

chroma_dir:      ./chroma_db_bge
embedding_model: BAAI/bge-small-zh-v1.5

graph_path:        ./data/knowledge_graph.pkl
chunk_index_path:  ./data/chunk_index.json

retrieval:
  type:          graph_rag
  k:             10
  hop:           1
  top_n:         10
  max_neighbors: 30
  rerank_model:  BAAI/bge-reranker-v2-m3

generation:
  provider: kimi
  model: moonshot-v1-32k
  temperature: 0.7
