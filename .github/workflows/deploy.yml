name: Deploy to AWS (ECR + ECS via Terraform)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: fortune-teller # must match terraform/environments/production/variables.tf: project_name

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform Backend (S3 + DynamoDB)
        run: |
          # 用 Account ID 构造全球唯一的 bucket 名
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TF_STATE_BUCKET="fortune-teller-terraform-state-${ACCOUNT_ID}"
          echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}" >> $GITHUB_ENV
          echo "Using state bucket: ${TF_STATE_BUCKET}"

          # 检查 bucket 是否属于当前账号（区分"不存在"和"属于别人"）
          HTTP_CODE=$(aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>&1 | grep -oP '(?<=\()\d{3}(?=\))' || echo "000")
          if [ "$HTTP_CODE" = "404" ] || [ "$HTTP_CODE" = "000" ]; then
            echo "Creating S3 state bucket..."
            aws s3api create-bucket \
              --bucket "${TF_STATE_BUCKET}" \
              --region us-east-1
            aws s3api put-bucket-versioning \
              --bucket "${TF_STATE_BUCKET}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${TF_STATE_BUCKET}" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "${TF_STATE_BUCKET}" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "S3 bucket created."
          else
            echo "S3 bucket already exists and belongs to this account."
          fi

          # Create DynamoDB lock table if it doesn't exist
          if ! aws dynamodb describe-table --table-name fortune-teller-terraform-lock --region us-east-1 2>/dev/null; then
            echo "Creating DynamoDB lock table..."
            aws dynamodb create-table \
              --table-name fortune-teller-terraform-lock \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-east-1
            echo "DynamoDB table created."
          else
            echo "DynamoDB table already exists."
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image variables
        id: vars
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "API_REPO=${{ env.PROJECT_NAME }}-api" >> $GITHUB_OUTPUT
          echo "APP_REPO=${{ env.PROJECT_NAME }}-app" >> $GITHUB_OUTPUT

      - name: Ensure ECR repositories exist
        run: |
          aws ecr create-repository --repository-name ${{ env.PROJECT_NAME }}-api --region ${{ env.AWS_REGION }} || true
          aws ecr create-repository --repository-name ${{ env.PROJECT_NAME }}-app --region ${{ env.AWS_REGION }} || true

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
          API_REPO: ${{ steps.vars.outputs.API_REPO }}
        run: |
          docker build -t "$ECR_REGISTRY/$API_REPO:$IMAGE_TAG" -f api/Dockerfile .
          docker push "$ECR_REGISTRY/$API_REPO:$IMAGE_TAG"

      - name: Build and push App image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
          APP_REPO: ${{ steps.vars.outputs.APP_REPO }}
        run: |
          docker build -t "$ECR_REGISTRY/$APP_REPO:$IMAGE_TAG" -f app/Dockerfile app
          docker push "$ECR_REGISTRY/$APP_REPO:$IMAGE_TAG"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/production
        run: terraform init -input=false -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Terraform Plan
        id: tfplan
        working-directory: terraform/environments/production
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          terraform plan \
            -input=false \
            -var "api_image_tag=$IMAGE_TAG" \
            -var "app_image_tag=$IMAGE_TAG" \
            -var "moonshot_api_key=${{ secrets.MOONSHOT_API_KEY }}" \
            -out tfplan

      - name: Terraform Apply
        if: steps.tfplan.outcome == 'success'
        working-directory: terraform/environments/production
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show deployment URLs
        if: steps.tfplan.outcome == 'success'
        working-directory: terraform/environments/production
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "### 🚀 Deployment URLs" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | http://${ALB_DNS} |" >> $GITHUB_STEP_SUMMARY
          echo "| API     | http://${ALB_DNS}/api |" >> $GITHUB_STEP_SUMMARY
          echo "| Health  | http://${ALB_DNS}/api/healthz |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "ALB DNS: $ALB_DNS"
